<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Explore a source-cited, expandable plant clade tree.">
    <title>Armchair Botanist</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2329795c' d='M50 8C28 9 13 21 13 39c0 10 7 17 17 17 19 0 28-22 20-48Z'/%3E%3Cpath fill='%23eff7ea' d='M21 48C28 33 37 23 49 13 37 28 29 39 25 55Z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./styles.css?v=20260515-cleanup-1">
  </head>
  <body>
    <main class="app-shell">
      <section class="tree-pane" aria-label="Plant tree explorer">
        <div id="treeViewport" class="tree-viewport">
          <div id="tree" class="tree" role="tree" aria-label="Source-cited plant clade tree"></div>
        </div>
      </section>

      <aside id="detailsPanel" class="details-panel" aria-live="polite" aria-label="Taxon details">
        <div id="detailsContent"></div>
      </aside>
    </main>

    <form class="search-panel" role="search" aria-label="Search plant tree">
      <div class="search-field">
        <input id="searchInput" type="search" autocomplete="off" placeholder="Try Rosids, Poaceae, Rosales...">
        <button id="clearSearch" type="button" aria-label="Clear search">×</button>
      </div>
      <div id="searchResults" class="search-results" aria-live="polite"></div>
    </form>

    <template id="nodeTemplate">
      <li class="tree-item" role="treeitem">
        <div class="node">
          <button class="node-main" type="button">
            <span class="node-text">
              <span class="node-name"></span>
              <span class="node-meta"></span>
            </span>
          </button>
          <button class="info-button" type="button" aria-label="Show more details">i</button>
        </div>
      </li>
    </template>

    <script src="./plant-tree-data.js?v=20260515-cleanup-1"></script>
    <script src="./app.js?v=20260515-cleanup-1"></script>
  </body>
</html>
