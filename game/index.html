<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Guess the family for a common plant in the Armchair Botanist tree.">
    <meta name="theme-color" content="#d9cdae">
    <meta name="apple-mobile-web-app-title" content="Armchair Botanist">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Armchair Botanist Game</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2329795c' d='M50 8C28 9 13 21 13 39c0 10 7 17 17 17 19 0 28-22 20-48Z'/%3E%3Cpath fill='%23eff7ea' d='M21 48C28 33 37 23 49 13 37 28 29 39 25 55Z'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png">
    <link rel="manifest" href="../manifest.webmanifest">
    <link rel="stylesheet" href="../styles.css?v=20260531-v2.42-learn-nav-cleanup-1">
    <link rel="stylesheet" href="./game.css?v=20260531-v2.42-learn-nav-cleanup-1">
  </head>
  <body class="game-page details-pane-hidden">
    <main class="app-shell">
      <section class="tree-pane" aria-label="Plant family game tree">
        <div id="treeViewport" class="tree-viewport">
          <div id="tree" class="tree" role="tree" aria-label="Guess the plant family"></div>
        </div>
      </section>

      <aside id="detailsPanel" class="details-panel" aria-live="polite" aria-label="Taxon details">
        <div
          id="detailsResizeHandle"
          class="details-resize-handle"
          role="separator"
          aria-controls="detailsContent"
          aria-label="Resize details pane"
          tabindex="0"
        ></div>
        <div id="detailsContent"></div>
      </aside>
    </main>

    <section class="game-panel" aria-label="Guess the plant family" aria-live="polite">
      <div class="challenge-row">
        <div class="challenge-prompt">
          <h1 id="plantPrompt">Loading...</h1>
        </div>

        <div class="selected-card" aria-label="Selected family">
          <strong id="selectedFamily">Pick family</strong>
          <span id="progressLabel" class="progress-label">1/1</span>
        </div>

        <div class="game-actions">
          <label class="level-control" aria-label="Game level">
            <select id="levelSelect"></select>
          </label>
          <button id="submitGuess" type="button" disabled>Guess</button>
          <button id="hintButton" type="button">Hint</button>
          <button id="nextPlantButton" type="button">Next</button>
        </div>
      </div>

      <div id="hintBox" class="feedback-box" hidden></div>
      <div id="feedbackBox" class="feedback-box result-box" hidden></div>
    </section>

    <nav class="mode-nav" aria-label="Site sections">
      <a class="mode-link" href="../index.html" aria-label="Tree" title="Tree">T</a>
      <a class="mode-link is-active" href="./index.html" aria-label="Game" title="Game" aria-current="page">G</a>
      <a class="mode-link" href="../learn/index.html" aria-label="Learn" title="Learn">L</a>
    </nav>

    <footer id="siteFooter" class="site-footer" aria-label="Site copyright"></footer>

    <div id="imageViewer" class="image-viewer" role="dialog" aria-modal="true" aria-label="Expanded image" hidden>
      <button id="imageViewerClose" class="image-viewer-close" type="button" aria-label="Close image">×</button>
      <figure class="image-viewer-figure">
        <img id="imageViewerImg" alt="">
        <figcaption id="imageViewerCaption"></figcaption>
      </figure>
    </div>

    <template id="nodeTemplate">
      <li class="tree-item" role="treeitem">
        <div class="node">
          <button class="node-main" type="button">
            <span class="node-text">
              <span class="node-name"></span>
              <span class="node-meta"></span>
            </span>
          </button>
          <button class="info-button" type="button" aria-label="Show more details">i</button>
        </div>
      </li>
    </template>

    <script src="../plant-tree-data.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
    <script src="../js/config.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
    <script src="../js/core.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
    <script src="../js/tree-view.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
    <script src="../js/details-pane.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
    <script src="./plant-game-data.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
    <script src="./game.js?v=20260531-v2.42-learn-nav-cleanup-1"></script>
  </body>
</html>
